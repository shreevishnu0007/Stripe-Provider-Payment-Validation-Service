# Resilience4j Circuit Breaker configurations
resilience4j.circuitbreaker.instances.payment-validation-service.failureRateThreshold=40
resilience4j.circuitbreaker.instances.payment-validation-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.payment-validation-service.waitDurationInOpenState=300s
resilience4j.circuitbreaker.instances.payment-validation-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.payment-validation-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.payment-validation-service.permittedNumberOfCallsInHalfOpenState=2
 
resilience4j.circuitbreaker.instances.payment-validation-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.payment-validation-service.slidingWindowType=COUNT_BASED


# ========= Eureka Client Configuration =========
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}

